<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Boost // Strategy Assistant</title>
    <style>
        :root {
            --bg: #F7F8FB; --card: #FFFFFF; --primary: #5B7FFF; --accent: #FF7A59;
            --text: #1F2937; --muted: #6B7280; --border: #E5E7EB; --green: #10B981; --orange: #F59E0B;
        }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.5; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        .logo { font-weight: 800; cursor: pointer; color: var(--primary); font-size: 1.2rem; }
        .logo span { color: var(--muted); font-weight: 400; }
        main { padding: 2rem; max-width: 1000px; margin: 0 auto; min-height: 80vh; }
        .view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); transition: all 0.2s ease; cursor: pointer; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: var(--primary); }
        .score-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; color: white; margin-top: 10px; }
        .insight-pill { background: #EEF2FF; color: var(--primary); padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin: 2px; }
        .form-container { background: white; padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; background: #FAFBFF; }
        
        .checkbox-group { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 10px; background: #f9fafb; padding: 1rem; border-radius: 8px; border: 1px solid var(--border); 
        }
        .checkbox-item { display: flex; align-items: center; font-size: 0.9rem; font-weight: 500; }
        .checkbox-item input { width: auto; margin-right: 8px; cursor: pointer; }

        .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn:hover { opacity: 0.8; }

        .file-upload-zone { 
            border: 2px dashed var(--border); padding: 2rem; text-align: center; 
            border-radius: 8px; cursor: pointer; background: #fff; transition: 0.2s;
        }
        .file-upload-zone:hover { border-color: var(--primary); background: #f0f7ff; }
        .file-list { margin-top: 10px; font-size: 0.85rem; color: var(--primary); font-weight: 600; }

        .strategy-section { background: white; padding: 2rem; border-radius: 12px; margin-top: 1rem; border: 1px solid var(--border); }
        .task-list { list-style: none; padding: 0; }
        .task-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; }
        .task-item::before { content: "→"; margin-right: 10px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="logo" onclick="app.view('dashboard')">Engagement Boost <span>// Strategy Assistant</span></div>
        <button class="btn btn-primary" onclick="app.view('input')">+ New Snapshot</button>
    </nav>
    <main id="app-viewport"></main>

    <script>
        const app = {
            clients: JSON.parse(localStorage.getItem('eb_data')) || [],
            
            init() { this.view('dashboard'); },

            view(name, index = null) {
                const vp = document.getElementById('app-viewport');
                if (name === 'dashboard') this.renderDashboard(vp);
                if (name === 'input') this.renderInput(vp);
                if (name === 'profile') this.renderProfile(vp, index);
                window.scrollTo(0,0);
            },

            save(data) {
                // Calculation Logic [cite: 37, 38, 39]
                const reachEff = (data.reach / (data.followers || 1)) * 10;
                const engRate = ((data.likes + data.comments) / (data.reach || 1)) * 100;
                const score = Math.min(Math.round((reachEff * 4) + (engRate * 15)), 100);

                const entry = { 
                    ...data, 
                    score, 
                    engRate: engRate.toFixed(2),
                    date: new Date().toLocaleDateString() 
                };

                const existing = this.clients.findIndex(c => c.name === data.name);
                if (existing > -1) this.clients[existing] = entry;
                else this.clients.push(entry);

                localStorage.setItem('eb_data', JSON.stringify(this.clients));
                this.view('dashboard');
            },

            renderDashboard(el) {
                const cards = this.clients.map((c, i) => `
                    <div class="card" onclick="app.view('profile', ${i})">
                        <div style="font-size: 0.7rem; color: var(--muted)">${c.date}</div>
                        <h3 style="margin: 0.5rem 0">${c.name}</h3>
                        <div>${c.platforms.map(p => `<span class="insight-pill">${p}</span>`).join('')}</div>
                        <div class="score-badge" style="background:${this.getColor(c.score)}">Score: ${c.score}</div>
                    </div>
                `).join('');
                el.innerHTML = `<div class="view-header"><h1>Portfolio</h1></div><div class="grid">${cards || '<p>No clients found. Click "+ New Snapshot" to get started.</p>'}</div>`;
            },

            renderInput(el) {
                el.innerHTML = `
                    <div class="view-header"><h1>New Strategic Snapshot</h1></div>
                    <div class="form-container">
                        <form onsubmit="app.handleSubmit(event)">
                            <div class="form-group"><label>Client Name</label><input id="name" required placeholder="Acme Corp"></div>
                            
                            <div class="form-group">
                                <label>Target Platforms</label>
                                <div class="checkbox-group">
                                    <div class="checkbox-item"><input type="checkbox" name="platform" value="Facebook"> Facebook</div>
                                    <div class="checkbox-item"><input type="checkbox" name="platform" value="Instagram"> Instagram</div>
                                    <div class="checkbox-item"><input type="checkbox" name="platform" value="TikTok"> TikTok</div>
                                    <div class="checkbox-item"><input type="checkbox" name="platform" value="YouTube"> YouTube</div>
                                    <div class="checkbox-item"><input type="checkbox" name="platform" value="LinkedIn"> LinkedIn</div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Option 1: Upload Reports (PDF/Images)</label>
                                <div class="file-upload-zone" onclick="document.getElementById('file-input').click()">
                                    <p id="file-status">Drag & drop or click to upload screenshots</p>
                                    <input type="file" id="file-input" style="display:none" multiple onchange="app.handleFileLabel(this)">
                                    <div id="file-names" class="file-list"></div>
                                </div>
                            </div>

                            <div style="text-align:center; margin: 2rem 0; color: var(--muted); font-weight:bold;">— OR ENTER MANUALLY —</div>

                            <div class="grid" style="grid-template-columns: 1fr 1fr;">
                                <div class="form-group"><label>Total Followers</label><input type="number" id="followers" value="0"></div>
                                <div class="form-group"><label>Monthly Reach</label><input type="number" id="reach" value="0"></div>
                                <div class="form-group"><label>Likes</label><input type="number" id="likes" value="0"></div>
                                <div class="form-group"><label>Comments</label><input type="number" id="comments" value="0"></div>
                            </div>
                            
                            <button class="btn btn-primary" type="submit" style="width:100%; margin-top:1rem;">Generate Analysis →</button>
                        </form>
                    </div>`;
            },

            renderProfile(el, i) {
                const c = this.clients[i];
                el.innerHTML = `
                    <div class="view-header">
                        <h1>${c.name}</h1>
                        <button class="btn btn-ghost" onclick="app.view('dashboard')">← Back</button>
                    </div>
                    
                    <div class="grid">
                        <div class="card" style="cursor:default">
                            <h4>Engagement Score</h4>
                            <h2 style="color:${this.getColor(c.score)}">${c.score}/100</h2>
                            <p style="font-size:0.9rem; color:var(--muted)">Avg Engagement: ${c.engRate}%</p>
                        </div>
                        <div class="card" style="cursor:default">
                            <h4>Platform Spread</h4>
                            <div style="margin-top:10px;">${c.platforms.map(p => `<span class="insight-pill">${p}</span>`).join('')}</div>
                        </div>
                    </div>

                    <div class="strategy-section">
                        <h3>Next Month's Roadmap</h3>
                        <p><strong>Primary Goal:</strong> Increase Community Depth</p>
                        <ul class="task-list">
                            <li class="task-item">Review uploaded screenshots for visual hooks</li>
                            <li class="task-item">Engage with 15 niche-specific accounts daily</li>
                            <li class="task-item">A/B test "Carousel vs Video" for high-reach topics</li>
                        </ul>
                    </div>
                `;
            },

            handleFileLabel(input) {
                const label = document.getElementById('file-names');
                label.innerHTML = Array.from(input.files).map(f => `📎 ${f.name}`).join('<br>');
            },

            handleSubmit(e) {
                e.preventDefault();
                const selectedPlatforms = Array.from(document.querySelectorAll('input[name="platform"]:checked')).map(p => p.value);
                
                const data = {
                    name: document.getElementById('name').value,
                    platforms: selectedPlatforms.length ? selectedPlatforms : ['General'],
                    followers: parseInt(document.getElementById('followers').value) || 0,
                    reach: parseInt(document.getElementById('reach').value) || 0,
                    likes: parseInt(document.getElementById('likes').value) || 0,
                    comments: parseInt(document.getElementById('comments').value) || 0,
                    filesCount: document.getElementById('file-input').files.length
                };
                this.save(data);
            },

            getColor(s) {
                if (s >= 80) return '#10B981';
                if (s >= 60) return '#5B7FFF';
                return '#FF7A59';
            }
        };

        app.init();
    </script>
</body>
</html>
