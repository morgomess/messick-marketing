<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messick Marketing | Full-Service Content Marketing Agency</title>
<meta name="description" content="Full-service content marketing agency. We work mostly with clients in science and medicine, but our skills translate to any industry."/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* 1. FONT IMPORT - TT INTERPHASES */
/* Note: Ensure 'fonts/TT-Interphases-Regular.woff2' exists on your server.
   The 'display: swap' property prevents the white screen by showing a fallback font first. */
@font-face {
  font-family: 'TT Interphases';
  src: url('fonts/TT-Interphases-Regular.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'TT Interphases';
  src: url('fonts/TT-Interphases-Bold.woff2') format('woff2');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

:root{
  --black:#111111;
  --white:#faf8f5;
  --gray:#f0eeeb;
  --gray-mid:#e2dfd9;
  --steel:#3a6b8a;
  --steel-light:#5a9ab8;
  --steel-pale:#d4e8f2;
  --dark-section:#1a1a1a;
  --text-dark:#e8e4de;
  --text-muted-dark:#9a928c;
  --text-light:#111111;
  --text-muted-light:#6b6560;
}
html{scroll-behavior:smooth}

body{
  /* The fallback fonts below ensure the site is visible while the custom font loads */
  font-family: 'TT Interphases', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background:var(--white);
  color:var(--text-light);
  line-height:1.7;
  font-weight:400;
  overflow-x:hidden;
}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--black);display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:68px;transition:box-shadow .3s}
nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.35)}
.nav-logo img{height:38px;width:auto;display:block}
.nav-links{display:flex;gap:2.4rem;list-style:none;align-items:center}
.nav-links a{font-size:.75rem;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--text-muted-dark);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-links .nav-cta{background:var(--steel);color:var(--white)!important;padding:.45rem 1.2rem;border-radius:2px;transition:background .2s!important}
.nav-links .nav-cta:hover{background:var(--steel-light)!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--white)}

/* ── SHARED ── */
section{padding:100px 5%}
.inner{max-width:1100px;margin:0 auto}
.eyebrow{font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--steel);margin-bottom:.9rem}
.eyebrow.light{color:var(--steel-light)}
h2.sh{font-family:inherit;font-size:clamp(2.1rem,3.2vw,3.2rem);font-weight:700;line-height:1.2;color:var(--black)}
h2.sh em{font-style:italic;color:var(--steel)}
h2.sh.on-dark{color:var(--white)}
h2.sh.on-dark em{color:var(--steel-light)}
.sub{font-size:1rem;font-weight:400;color:var(--text-muted-light);line-height:1.85;max-width:540px;margin-top:.9rem}
.sub.on-dark{color:var(--text-muted-dark)}
.btn{display:inline-flex;align-items:center;gap:.5rem;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;padding:.85rem 2rem;border-radius:2px;transition:background .2s,transform .15s,box-shadow .2s}
.btn:hover{transform:translateY(-1px)}
.btn-ink{background:var(--black);color:var(--white)}
.btn-ink:hover{background:#2a2a2a;box-shadow:0 6px 20px rgba(0,0,0,.2)}
.btn-steel{background:var(--steel);color:var(--white)}
.btn-steel:hover{background:var(--steel-light)}
.btn-ghost{background:transparent;color:var(--text-dark);border:1px solid rgba(255,255,255,.25)}
.btn-ghost:hover{border-color:rgba(255,255,255,.6);color:var(--white)}
.btn-white{background:var(--white);color:var(--black)}
.btn-white:hover{background:var(--steel-pale)}

/* fade-up */
.fu{opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease}
.fu.in{opacity:1;transform:none}

/* ── HERO ── */
#hero{
  min-height:100vh;padding-top:68px;
  display:flex;align-items:center;
  position:relative;overflow:hidden;
  background:var(--black);
}
.hero-bg{
  position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:75% 30%;
  filter:brightness(.52) saturate(.65);
}
#hero::before{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(to right, rgba(17,17,17,.62) 0%, rgba(17,17,17,.38) 55%, rgba(17,17,17,.1) 100%),
    linear-gradient(to bottom, rgba(17,17,17,.2) 0%, transparent 40%, rgba(17,17,17,.35) 100%);
}
.hero-inner{
  position:relative;z-index:2;
  max-width:1100px;margin:0 auto;width:100%;
  padding:90px 0;
}
.hero-logo{
  width:min(220px,45vw);
  margin-bottom:2.8rem;
  filter:brightness(0) invert(1);
  opacity:.9;
  display:block;
}
.hero-eyebrow{font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--steel-light);margin-bottom:1.2rem}
.hero-headline{font-family:inherit;font-size:clamp(2.8rem,4.8vw,5rem);font-weight:700;line-height:1.12;color:var(--white);margin-bottom:1.6rem}
.hero-headline em{font-style:italic;color:var(--steel-light)}
.hero-body{font-size:1.05rem;font-weight:400;color:rgba(232,228,222,.75);max-width:480px;line-height:1.85;margin-bottom:2.5rem}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap}

/* ── MARQUEE ── */
.marquee-wrap{background:var(--steel);padding:.85rem 0;overflow:hidden;white-space:nowrap}
.marquee-track{display:inline-flex;animation:marquee 36s linear infinite}
.marquee-track span{font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(250,248,245,.65);padding:0 2rem}
.marquee-track span.dot{color:rgba(250,248,245,.25);padding:0}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── VISIBILITY ── */
#visibility{background:var(--black);padding:100px 5%}
.vis-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center}
.vis-chart-wrap{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:2rem}
.vis-chart-label{font-size:.6rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--steel-pale);opacity:.6;margin-bottom:1.4rem}
.vis-bars{display:flex;align-items:flex-end;gap:1.2rem;height:130px;margin-bottom:1rem}
.vis-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:.4rem}
.vis-bar-pair{width:100%;display:flex;gap:4px;align-items:flex-end;height:110px}
.vis-bar{border-radius:3px 3px 0 0;width:50%;transition:height 1.2s cubic-bezier(.4,0,.2,1)}
.vis-bar.active{background:var(--steel-light)}
.vis-bar.inactive{background:rgba(255,255,255,.28)}
.vis-bar-name{font-size:.6rem;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;text-align:center}
.vis-legend{display:flex;gap:1.5rem;margin-top:1.2rem}
.vis-legend-item{display:flex;align-items:center;gap:.4rem;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.vis-legend-dot{width:8px;height:8px;border-radius:1px}
.vis-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:1rem}
.vis-stat{background:rgba(0,0,0,.3);border-radius:4px;padding:.7rem .5rem;text-align:center}
.vis-stat-n{font-family:inherit;font-size:1.3rem;font-weight:700;color:var(--white)}
.vis-stat-l{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:.15rem}
.vis-copy .eyebrow{color:rgba(250,248,245,.35)}
.vis-headline{font-family:inherit;font-size:clamp(2rem,3vw,3.2rem);font-weight:400;line-height:1.2;color:var(--white);margin-bottom:1.4rem}
.vis-headline strong{display:block;font-weight:700}
.vis-body{font-size:.95rem;font-weight:400;color:var(--text-muted-dark);line-height:1.9;margin-bottom:.8rem}
.vis-body strong{color:var(--white);font-weight:700}

/* ── WHO WE SERVE ── */
#serve{background:var(--white)}
.serve-head{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:end;margin-bottom:3.5rem}
.serve-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--gray-mid)}
.serve-tile{padding:2.2rem 1.8rem;border-right:1px solid var(--gray-mid);border-bottom:1px solid var(--gray-mid);transition:background .22s}
.serve-tile:hover{background:var(--gray)}
.serve-tile:nth-child(3n){border-right:none}
.serve-tile:nth-last-child(1){border-bottom:none}
.st-icon{font-size:1.4rem;margin-bottom:1rem;display:block}
.st-name{font-family:inherit;font-size:1.15rem;font-weight:700;color:var(--black);margin-bottom:.5rem;line-height:1.25}
.st-desc{font-size:.82rem;font-weight:400;color:var(--text-muted-light);line-height:1.7}

/* ── SERVICES ── */
#services{background:var(--black)}
.svc-layout{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:280px 1fr;gap:6rem;align-items:start}
.svc-sticky{position:sticky;top:90px}
.svc-sticky .sub{max-width:none}
.svc-list{border-top:1px solid rgba(255,255,255,.07)}
.svc-item{display:grid;grid-template-columns:48px 1fr;gap:1.4rem;align-items:start;padding:1.8rem 0;border-bottom:1px solid rgba(255,255,255,.07);transition:padding-left .2s}
.svc-icon{width:48px;height:48px;border-radius:8px;background:rgba(58,107,138,.15);border:1px solid rgba(90,154,184,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,border-color .2s}
.svc-icon svg{width:22px;height:22px;stroke:var(--steel-light);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.svc-name{font-family:inherit;font-size:1.4rem;font-weight:700;color:var(--white);margin-bottom:.4rem;line-height:1.2}
.svc-desc{font-size:.88rem;font-weight:400;color:var(--text-muted-dark);line-height:1.75;transition:color .2s}

/* ── CALLOUT ── */
#callout{background:var(--steel);padding:90px 5%}
.callout-inner{max-width:800px;margin:0 auto;text-align:center}
.callout-quote{font-family:inherit;font-size:clamp(1.8rem,3vw,3rem);font-weight:400;font-style:italic;line-height:1.4;color:var(--white);margin-bottom:1.5rem}
.callout-body{font-size:1rem;font-weight:400;color:rgba(255,255,255,.7);line-height:1.85;max-width:580px;margin:0 auto 2.2rem}

/* ── ABOUT ── */
#founder{background:var(--gray)}
.founder-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:360px 1fr;gap:6rem;align-items:center}
.founder-frame{position:relative}
.founder-photo{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:center 20%;border-radius:2px;display:block;position:relative;z-index:1}
.founder-badge{position:absolute;bottom:-1.2rem;right:-1.2rem;z-index:2;background:var(--black);padding:.9rem 1.4rem;border-radius:2px;box-shadow:0 6px 24px rgba(0,0,0,.18)}
.founder-badge-name{font-family:inherit;font-size:1.15rem;font-weight:700;color:var(--white);line-height:1.2}
.founder-badge-title{font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--steel-light);margin-top:.2rem}
.divider{width:40px;height:1.5px;background:var(--steel);margin:1.5rem 0}
.founder-bio{font-size:.94rem;font-weight:400;color:var(--text-muted-light);line-height:1.9;margin-bottom:.9rem}

/* ── TESTIMONIALS ── */
#testimonials{background:var(--black)}
.testi-stage{max-width:760px;margin:2.5rem auto 0;position:relative}
.testi-card{display:none;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);padding:2.8rem 2.6rem;border-radius:2px;position:relative}
.testi-card.active{display:block;animation:fadeSlide .5s ease}
.testi-text{font-family:inherit;font-size:1.2rem;font-style:italic;font-weight:400;line-height:1.75;color:var(--text-dark);margin-bottom:1.6rem;padding-top:1.8rem}
.testi-author{font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--steel-light)}
.testi-role{font-size:.75rem;color:var(--text-muted-dark);margin-top:.2rem}
.testi-nav{display:flex;align-items:center;justify-content:center;gap:.8rem;margin-top:1.8rem}
.testi-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;padding:0;transition:background .2s,transform .2s}
.testi-dot.active{background:var(--steel-light);transform:scale(1.25)}
.testi-arrows{display:flex;gap:.6rem;margin-left:1rem}
.testi-arrow{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted-dark);font-size:.8rem;transition:background .2s,color .2s}
.testi-arrow:hover{background:rgba(58,107,138,.3);color:var(--white)}

/* ── CONTACT ── */
#contact{background:var(--white)}
.contact-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:start}
.contact-headline{font-family:inherit;font-size:clamp(2rem,3vw,3rem);font-weight:700;line-height:1.2;color:var(--black);margin-bottom:1rem}
.contact-headline em{font-style:italic;color:var(--steel)}
.contact-body{font-size:.95rem;font-weight:400;color:var(--text-muted-light);line-height:1.85;margin-bottom:1.5rem}
.contact-email{display:flex;align-items:center;gap:.7rem;margin-bottom:1.5rem}
.contact-email svg{width:16px;height:16px;stroke:var(--steel);fill:none;stroke-width:1.5;flex-shrink:0}
.contact-email a{font-size:.9rem;color:var(--steel);text-decoration:none;transition:color .2s}
.contact-email a:hover{color:var(--black)}
.contact-list{list-style:none}
.contact-list li{font-size:.88rem;font-weight:400;color:var(--text-muted-light);padding:.6rem 0;border-bottom:1px solid var(--gray-mid);display:flex;align-items:center;gap:.7rem;line-height:1.5}
.contact-list li:first-child{border-top:1px solid var(--gray-mid)}
.contact-list li::before{content:'';width:6px;height:6px;min-width:6px;border-radius:50%;background:var(--steel);flex-shrink:0}

/* ── FOOTER ── */
footer
