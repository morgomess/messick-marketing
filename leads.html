<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2Messick Marketing | Agency Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --black: #111111; --steel: #3a6b8a; --warm: #faf8f5; --border: #dde5ea; --danger: #c0392b; --success: #2e7d5e; }
        body { font-family: 'Jost', sans-serif; background: var(--warm); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--black); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .shell { display: flex; flex: 1; }
        aside { width: 220px; background: var(--black); padding: 20px 0; flex-shrink: 0; }
        .step { padding: 12px 25px; color: rgba(255,255,255,0.3); font-size: 13px; border-left: 3px solid transparent; }
        .step.active { color: white; background: rgba(58,107,138,0.15); border-left: 3px solid var(--steel); }
        main { flex: 1; padding: 40px; max-width: 1100px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 25px; }
        .page { display: none; } .page.active { display: block; }
        .score-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .score-card { background: white; border: 1px solid var(--border); padding: 20px; text-align: center; border-radius: 8px; }
        .score-val { font-family: 'Cormorant Garamond'; font-size: 38px; font-weight: 700; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; }
        button { background: var(--steel); color: white; border: none; padding: 14px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        #aiOutput { white-space: pre-wrap; line-height: 1.8; font-size: 15px; color: #444; }
    </style>
</head>
<body>

<header>
    <div style="font-family:'Cormorant Garamond'; font-size:22px; letter-spacing:1px;">Messick Marketing</div>
    <div style="font-size:11px; text-transform:uppercase; color:var(--steel);">Internal Pitch Tool</div>
</header>

<div class="shell">
    <aside>
        <div class="step active" id="s1">1. Prospect Info</div>
        <div class="step" id="s2">2. Researching</div>
        <div class="step" id="s3">3. Findings & Gaps</div>
    </aside>

    <main>
        <div id="p1" class="page active">
            <h2 style="font-family:'Cormorant Garamond'; font-size:32px; margin-bottom:20px;">Begin Analysis</h2>
            <div class="card">
                <input type="text" id="bizName" placeholder="Practice Name">
                <input type="text" id="location" placeholder="City, State">
                <input type="url" id="website" placeholder="Website URL (https://...)">
                <button onclick="runLogic()">Generate Insight →</button>
            </div>
        </div>

        <div id="p2" class="page">
            <h2 style="font-family:'Cormorant Garamond';">Researching...</h2>
            <div class="card" style="text-align:center; padding:80px 20px;">
                <div id="status">Scraping site data and identifying marketing gaps...</div>
            </div>
        </div>

        <div id="p3" class="page">
            <h2 style="font-family:'Cormorant Garamond'; font-size:32px; margin-bottom:15px;">Analysis Summary</h2>
            <div class="score-strip">
                <div class="score-card"><div class="score-val" style="color:#2e7d5e">72</div><div style="font-size:11px; color:#888;">SEO</div></div>
                <div class="score-card"><div class="score-val" style="color:#c0392b">38</div><div style="font-size:11px; color:#888;">GBP</div></div>
                <div class="score-card"><div class="score-val" style="color:#2e7d5e">84</div><div style="font-size:11px; color:#888;">REVIEWS</div></div>
                <div class="score-card"><div class="score-val" style="color:#c0392b">21</div><div style="font-size:11px; color:#888;">SOCIAL</div></div>
            </div>
            <div class="card">
                <div id="aiOutput">Preparing results...</div>
            </div>
            <button onclick="location.reload()" style="background:#444; width:auto; padding:10px 30px;">Restart</button>
        </div>
    </main>
</div>

<script>
const WORKER_URL = "https://messick-marketing-ai-proxy.morgan-2bf.workers.dev";

function goTo(n) {
    document.querySelectorAll('.page, .step').forEach(el => el.classList.remove('active'));
    document.getElementById('p'+n).classList.add('active');
    document.getElementById('s'+n).classList.add('active');
}

async function runLogic() {
    const biz = document.getElementById('bizName').value;
    const loc = document.getElementById('location').value;
    const web = document.getElementById('website').value;
    if(!biz) return alert("Please enter a Business Name.");

    goTo(2);

    try {
        // STEP 1: SCRAPE
        const scrape = await fetch(WORKER_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: 'scrape', bizName: biz, location: loc, website: web })
        }).then(r => r.json());

        // STEP 2: AI 
        const ai = await fetch(WORKER_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                system: "You are a senior marketing strategist. Analyze the data and provide a concise, professional gap analysis for a pitch.",
                messages: [{ role: 'user', content: `Analyze this data: ${JSON.stringify(scrape)}` }]
            })
        }).then(r => r.json());

        if (ai.error) {
            document.getElementById('aiOutput').innerText = "Error: " + ai.error;
        } else {
            document.getElementById('aiOutput').innerText = ai.text;
        }
        
        goTo(3);

    } catch (e) {
        alert("System Error: " + e.message);
        goTo(1);
    }
}
</script>
</body>
</html>
