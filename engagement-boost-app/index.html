<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Boost / AI</title>
    <style>
        :root { --bg: #F7F8FB; --card: #FFFFFF; --primary: #5B7FFF; --text: #1F2937; --border: #E5E7EB; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .top-nav { display: flex; justify-content: space-between; padding: 1rem 2rem; background: white; border-bottom: 1px solid var(--border); }
        main { padding: 2rem; max-width: 800px; margin: 0 auto; }
        .form-container { background: white; padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; background: var(--primary); color: white; margin-top: 10px; }
        input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #debug-log { background: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; font-size: 0.8rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); position: relative; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div style="font-weight:800; color:var(--primary); cursor:pointer;" onclick="app.view('dashboard')">Engagement Boost</div>
    <div>
        <button class="btn" style="background:#f3f4f6; color:black;" onclick="app.toggleSettings()">⚙️ Settings</button>
        <button class="btn" onclick="app.view('input')">+ New</button>
    </div>
</nav>

<main id="app-viewport"></main>

<div id="settings-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:100;">
    <div class="form-container" style="max-width:400px; width:90%;">
        <h3>Settings</h3>
        <label>Anthropic API Key</label>
        <input type="password" id="api-key-input" placeholder="sk-ant-...">
        <button class="btn" onclick="app.saveSettings()" style="width:100%">Save</button>
    </div>
</div>

<script>
const app = {
    clients: JSON.parse(localStorage.getItem('eb_data')) || [],
    apiKey: localStorage.getItem('eb_ant_key') || '',

    init() { 
        const isAuth = sessionStorage.getItem('eb_auth');
        if (!isAuth) this.renderLogin();
        else this.view('dashboard');
    },

    renderLogin() {
        document.getElementById('app-viewport').innerHTML = `
            <div class="form-container" style="max-width:350px; margin: 50px auto; text-align:center;">
                <h2>Login</h2>
                <input type="password" id="pass-input" placeholder="Password">
                <button class="btn" onclick="app.checkPass()" style="width:100%">Unlock</button>
            </div>`;
    },

    checkPass() {
        if (document.getElementById('pass-input').value === 'Messick2026') {
            sessionStorage.setItem('eb_auth', 'true');
            this.view('dashboard');
        } else alert('Wrong password');
    },

    toggleSettings() {
        const m = document.getElementById('settings-modal');
        document.getElementById('api-key-input').value = this.apiKey;
        m.style.display = m.style.display === 'none' ? 'flex' : 'none';
    },

    saveSettings() {
        this.apiKey = document.getElementById('api-key-input').value;
        localStorage.setItem('eb_ant_key', this.apiKey);
        this.toggleSettings();
    },

    view(name, index = null) {
        const vp = document.getElementById('app-viewport');
        if (name === 'dashboard') this.renderDashboard(vp);
        if (name === 'input') this.renderInput(vp);
        if (name === 'profile') this.renderProfile(vp, index);
    },

    renderDashboard(el) {
        const cards = this.clients.map((c, i) => `
            <div class="card" onclick="app.view('profile', ${i})">
                <button onclick="event.stopPropagation(); app.deleteClient(${i})" style="position:absolute; top:10px; right:10px; border:none; color:red; background:none; cursor:pointer;">Delete</button>
                <h3>${c.name}</h3>
                <p>Score: <strong>${c.score || 0}/100</strong></p>
            </div>
        `).join('');
        el.innerHTML = `<h1>Portfolio</h1><div class="grid">${cards || '<p>No clients yet.</p>'}</div>`;
    },

    renderInput(el) {
        el.innerHTML = `
            <div class="form-container">
                <h2>New Snapshot</h2>
                <input id="name" placeholder="Client Name">
                <label>Upload Report Image</label>
                <input type="file" id="file-input" accept="image/*">
                <button class="btn" id="sub-btn" onclick="app.handleProcess()" style="width:100%">Analyze with AI</button>
                <button class="btn" style="background:#6B7280; width:100%" onclick="app.view('manual-entry')">Manual Entry Only</button>
                <div id="debug-log"></div>
            </div>`;
    },

    async handleProcess() {
        const name = document.getElementById('name').value;
        const file = document.getElementById('file-input').files[0];
        const btn = document.getElementById('sub-btn');
        const debug = document.getElementById('debug-log');
        
        if (!name || !file) return alert("Missing name or file");
        if (!this.apiKey) return alert("Add API key in settings first!");

        btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Thinking...';
        debug.style.display = 'none';

        try {
            const base64 = await new Promise((res) => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = () => res(r.result.split(',')[1]);
            });

            const resp = await fetch("https://calm-rice-eb6b.morgan-2bf.workers.dev", {
                method: 'POST',
                body: JSON.stringify({
                    apiKey: this.apiKey,
                    payload: {
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 1024,
                        messages: [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } }, { type: "text", text: "Return ONLY JSON: {followers:number, reach:number, likes:number, comments:number, engRate:number}" }]}]
                    }
                })
            });

            const data = await resp.json();
            
            // Check for AI Errors
            if (data.error) throw new Error("Anthropic Error: " + data.error.message);
            if (!data.content) throw new Error("No data returned. Check your API credits.");

            const metrics = JSON.parse(data.content[0].text);
            this.saveClient(name, metrics);

        } catch (e) {
            btn.disabled = false; btn.innerText = 'Analyze with AI';
            debug.innerText = "ERROR: " + e.message;
            debug.style.display = 'block';
        }
    },

    saveClient(name, m) {
        const score = Math.min(100, Math.round(((m.reach || 1) / (m.followers || 1) * 30) + (m.engRate || 0) * 10));
        this.clients.push({ name, ...m, score, date: new Date().toLocaleDateString() });
        localStorage.setItem('eb_data', JSON.stringify(this.clients));
        this.view('dashboard');
    },

    deleteClient(i) {
        if(confirm("Delete?")) {
            this.clients.splice(i, 1);
            localStorage.setItem('eb_data', JSON.stringify(this.clients));
            this.view('dashboard');
        }
    },

    renderProfile(el, i) {
        const c = this.clients[i];
        el.innerHTML = `<h1>${c.name}</h1><div class="card"><h3>Eng. Rate: ${c.engRate}%</h3><p>Followers: ${c.followers}</p><p>Reach: ${c.reach}</p></div><br><button class="btn" onclick="app.view('dashboard')">Back</button>`;
    }
};
app.init();
</script>
</body>
</html>
