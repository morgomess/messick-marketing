<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Boost App</title>
    <style>
        :root { --bg: #F7F8FB; --card: #FFFFFF; --primary: #5B7FFF; --text: #1F2937; --border: #E5E7EB; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .top-nav { display: flex; justify-content: space-between; padding: 1rem 2rem; background: white; border-bottom: 1px solid var(--border); }
        main { padding: 2rem; max-width: 800px; margin: 0 auto; }
        .form-container { background: white; padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; background: var(--primary); color: white; margin-top: 10px; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; }
        .drop-zone { border: 2px dashed var(--border); padding: 3rem 1rem; text-align: center; border-radius: 12px; cursor: pointer; background: #fff; margin: 1rem 0; }
        .drop-zone.active { border-color: var(--primary); background: #f0f7ff; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #debug-log { background: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; font-size: 0.8rem; border: 1px solid #fecaca; word-break: break-all; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); position: relative; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div style="font-weight:800; color:var(--primary); cursor:pointer; font-size:1.2rem;" onclick="app.view('dashboard')">Engagement Boost // AI</div>
    <div>
        <button class="btn" style="background:#f3f4f6; color:black;" onclick="app.toggleSettings()">⚙️ Settings</button>
        <button class="btn" onclick="app.view('input')">+ New Snapshot</button>
    </div>
</nav>

<main id="app-viewport"></main>

<div id="settings-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:100;">
    <div class="form-container" style="max-width:400px; width:90%;">
        <h3>API Configuration</h3>
        <label>Anthropic API Key</label>
        <input type="password" id="api-key-input" placeholder="sk-ant-...">
        <button class="btn" onclick="app.saveSettings()" style="width:100%">Save & Close</button>
    </div>
</div>

<script>
const app = {
    clients: JSON.parse(localStorage.getItem('eb_data')) || [],
    apiKey: localStorage.getItem('eb_ant_key') || '',
    currentFile: null,

    init() { 
        const isAuth = sessionStorage.getItem('eb_auth');
        if (!isAuth) this.renderLogin();
        else this.view('dashboard');
    },

    renderLogin() {
        document.getElementById('app-viewport').innerHTML = `
            <div class="form-container" style="max-width:350px; margin: 100px auto; text-align:center;">
                <h2>Agency Access</h2>
                <input type="password" id="pass-input" placeholder="Enter Password">
                <button class="btn" onclick="app.checkPass()" style="width:100%">Unlock Tool</button>
            </div>`;
    },

    checkPass() {
        if (document.getElementById('pass-input').value === 'Messick2026') {
            sessionStorage.setItem('eb_auth', 'true');
            this.view('dashboard');
        } else alert('Incorrect Password');
    },

    toggleSettings() {
        const m = document.getElementById('settings-modal');
        document.getElementById('api-key-input').value = this.apiKey;
        m.style.display = m.style.display === 'none' ? 'flex' : 'none';
    },

    saveSettings() {
        this.apiKey = document.getElementById('api-key-input').value.trim();
        localStorage.setItem('eb_ant_key', this.apiKey);
        this.toggleSettings();
    },

    view(name, index = null) {
        const vp = document.getElementById('app-viewport');
        if (name === 'dashboard') this.renderDashboard(vp);
        if (name === 'input') this.renderInput(vp);
        if (name === 'profile') this.renderProfile(vp, index);
        window.scrollTo(0,0);
    },

    renderDashboard(el) {
        const cards = this.clients.map((c, i) => `
            <div class="card" onclick="app.view('profile', ${i})">
                <button onclick="event.stopPropagation(); app.deleteClient(${i})" style="position:absolute; top:12px; right:12px; border:none; color:#EF4444; background:#FEE2E2; cursor:pointer; padding:4px 8px; border-radius:4px; font-size:0.7rem;">Delete</button>
                <h3 style="margin:0">${c.name}</h3>
                <div style="font-size:1.2rem; font-weight:800; color:var(--primary)">${c.score || 0}/100</div>
            </div>
        `).join('');
        el.innerHTML = `<h1 style="margin-bottom:2rem;">Portfolio</h1><div class="grid">${cards || '<p>No snapshots yet.</p>'}</div>`;
    },

    renderInput(el) {
        el.innerHTML = `
            <div class="form-container">
                <h2>New Snapshot</h2>
                <input id="name" type="text" placeholder="Client Name">
                <div id="drop-zone" class="drop-zone"><p id="drop-text">Drag & Drop Report (PNG, JPG, PDF)</p><input type="file" id="file-input" hidden accept="image/*,application/pdf"></div>
                <button class="btn" id="sub-btn" onclick="app.handleProcess()" style="width:100%">Analyze & Generate Snapshot</button>
                <div id="debug-log"></div>
            </div>`;
        this.initDropZone();
    },

    initDropZone() {
        const zone = document.getElementById('drop-zone');
        const input = document.getElementById('file-input');
        zone.onclick = () => input.click();
        ['dragover', 'dragleave'].forEach(e => zone.addEventListener(e, (ev) => { ev.preventDefault(); zone.classList.toggle('active', e === 'dragover'); }));
        zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('active'); if (e.dataTransfer.files.length) { this.currentFile = e.dataTransfer.files[0]; document.getElementById('drop-text').innerText = "📄 " + this.currentFile.name; } });
        input.onchange = () => { if (input.files.length) { this.currentFile = input.files[0]; document.getElementById('drop-text').innerText = "📄 " + this.currentFile.name; } };
    },

    async handleProcess() {
        const name = document.getElementById('name').value;
        const btn = document.getElementById('sub-btn');
        const debug = document.getElementById('debug-log');
        if (!name || !this.currentFile) return alert("Need name and file.");
        
        btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Analyzing...';
        debug.style.display = 'none';

        try {
            const base64 = await new Promise((res) => { const r = new FileReader(); r.readAsDataURL(this.currentFile); r.onload = () => res(r.result.split(',')[1]); });
            const isPDF = this.currentFile.type === "application/pdf";

           const resp = await fetch("https://calm-rice-eb6b.morgan-2bf.workers.dev", {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
                    apiKey: this.apiKey,
                    payload: {
                        model: "claude-sonnet-4-6",
                        max_tokens: 1024,
                        messages: [{ 
                            role: "user", 
                            content: [
                                { 
                                    type: isPDF ? "document" : "image", 
                                    source: { type: "base64", media_type: this.currentFile.type || "image/jpeg", data: base64 } 
                                }, 
                                { type: "text", text: "Extract numbers: followers, reach, likes, comments, and engagement rate. Return ONLY a JSON object: {followers, reach, likes, comments, engRate}" }
                            ]
                        }]
                    }
                })
            });

            const data = await resp.json();
            
            // CRITICAL: Handle the error message explicitly
            if (!resp.ok || data.error) {
                throw new Error(data.error ? data.error.message : "Bridge Error. Check API credits/key.");
            }
            if (!data.content || !data.content[0]) {
                throw new Error("AI returned no content. This usually means the API key is invalid or lacks credits.");
            }

            const metrics = JSON.parse(data.content[0].text.match(/\{.*\}/s)[0]);
            const score = Math.min(100, Math.round(((metrics.reach || 1) / (metrics.followers || 1) * 20) + (metrics.engRate || 0) * 10));
            this.clients.push({ name, ...metrics, score, date: new Date().toLocaleDateString() });
            localStorage.setItem('eb_data', JSON.stringify(this.clients));
            this.view('dashboard');

        } catch (e) {
            btn.disabled = false; btn.innerText = 'Analyze & Generate Snapshot';
            debug.innerText = "Error: " + e.message;
            debug.style.display = 'block';
        }
    },

    deleteClient(i) {
        if(confirm("Delete?")) { this.clients.splice(i, 1); localStorage.setItem('eb_data', JSON.stringify(this.clients)); this.view('dashboard'); }
    },

    renderProfile(el, i) {
        const c = this.clients[i];
        el.innerHTML = `<h1>${c.name}</h1><div class="card"><h3>Score: ${c.score}/100</h3><p>Eng Rate: ${c.engRate}%</p><p>Reach: ${c.reach}</p></div><button class="btn" onclick="app.view('dashboard')">Back</button>`;
    }
};
app.init();
</script>
</body>
</html>
